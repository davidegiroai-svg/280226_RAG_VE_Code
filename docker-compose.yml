services:
  db:
    image: "pgvector/pgvector:pg16"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-rag}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-rag_password_change_me}"
      POSTGRES_DB: "${POSTGRES_DB:-rag}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db_init.sql:/docker-entrypoint-initdb.d/01_db_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: "db"
      DB_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER:-rag}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-rag_password_change_me}"
      POSTGRES_DB: "${POSTGRES_DB:-rag}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-ollama}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-768}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      EMBEDDING_TIMEOUT_S: "${EMBEDDING_TIMEOUT_S:-30}"
      INBOX_ROOT: "${INBOX_ROOT:-/data/inbox}"
      MAX_UPLOAD_SIZE_MB: "${MAX_UPLOAD_SIZE_MB:-50}"
    volumes:
      - ./tests:/app/tests:ro
      - ./data:/data:rw
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: "db"
      DB_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER:-rag}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-rag_password_change_me}"
      POSTGRES_DB: "${POSTGRES_DB:-rag}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-ollama}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-768}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      EMBEDDING_TIMEOUT_S: "${EMBEDDING_TIMEOUT_S:-30}"
    volumes:
      - ./data:/data:ro
    entrypoint: ["python", "-m", "app.ingest_fs"]
    profiles:
      - manual

volumes:
  pgdata: